<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery - FrameVault</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#f5f5f5; }
    nav { background:#222; color:white; padding:15px 30px; display:flex; justify-content:flex-end; align-items:center; gap:12px; }
    nav a { color:white; text-decoration:none; font-weight:bold; background:#ff9800; padding:8px 16px; border-radius:6px; }
    nav a:hover { background:#e68900; }
    .nav-email { color:#ff9800; font-weight:bold; }
    .nav-logout { background:#333 !important; }
    header { background:#111; color:white; padding:20px; text-align:center; }
    header input { width:60%; padding:12px; margin-top:15px; font-size:16px; border:none; border-radius:5px; }
    .container { padding:30px; }
    .gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; }
    .card { background:white; border-radius:8px; box-shadow:0 4px 15px rgba(0,0,0,0.1); overflow:hidden; text-align:center; padding-bottom:10px; cursor:pointer; }
    .card img { width:100%; height:200px; object-fit:cover; display:block; }
    .photo-name { margin-top:8px; font-weight:bold; font-size:16px; color:#333; padding:0 10px 10px; word-break:break-word; }
    .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1000; }
    .modal-overlay.show { display:flex; }
    .modal-box { background:white; padding:20px; border-radius:10px; max-width:650px; width:90%; text-align:center; }
    .modal-box img { max-width:100%; height:auto; border-radius:8px; }
    button { padding:10px 15px; border-radius:6px; border:none; cursor:pointer; font-weight:bold; margin:5px; }
    .btn-delete { background:red; color:white; }
    .btn-close { background:#eee; color:#333; }
    footer { background:#111; color:white; text-align:center; padding:15px; margin-top:30px; }
  </style>
</head>
<body>
<nav id="navLinks">
  <a href="index.html">Home</a>
  <a href="upload.html">Upload</a>
  <a href="login.html">Login</a>
  <a href="sign up.html">Sign Up</a>
</nav>
<header>
  <h1>FrameVault Gallery</h1>
  <p>Your uploaded media stored in Azure</p>
  <input type="text" id="searchInput" placeholder="Search photos..." oninput="filterGallery()">
</header>
<div class="container">
  <h2>Gallery</h2>
  <div class="gallery" id="gallery">
    <p id="loadingMsg">Loading your images...</p>
  </div>
</div>
<footer>© 2026 FrameVault | Stored on Azure Blob Storage + Cosmos DB</footer>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <img id="modalImg" src="" alt="">
    <h3 id="modalTitle"></h3>
    <p id="modalSize"></p>
    <p id="modalDate"></p>
    <button class="btn-delete" onclick="deleteImage()">Delete Image</button>
    <button class="btn-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
  let allItems = [];
  let currentItem = null;

  // Navbar login state
  const token = localStorage.getItem('token');
  const email = localStorage.getItem('userEmail');
  const nav = document.getElementById('navLinks');
  if (token) {
    nav.innerHTML = `
      <a href="index.html">Home</a>
      <a href="upload.html">Upload</a>
      <span class="nav-email">${email || 'Account'}</span>
      <a href="#" class="nav-logout" onclick="logout()">Logout</a>
    `;
  }
  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('userEmail');
    window.location.href = 'login.html';
  }

  async function loadGallery() {
    if (!token) {
      document.getElementById('loadingMsg').textContent = 'Please log in to see your gallery.';
      return;
    }
    try {
      const res = await fetch('/api/media', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) {
        document.getElementById('loadingMsg').textContent = 'Could not load gallery.';
        return;
      }
      allItems = await res.json();
      renderGallery(allItems);
    } catch(e) {
      document.getElementById('loadingMsg').textContent = 'Error loading gallery.';
    }
  }

  function renderGallery(items) {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    if (items.length === 0) {
      gallery.innerHTML = '<p>No images yet. <a href="upload.html">Upload one!</a></p>';
      return;
    }
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<img src="${item.url}" alt="${item.title}"><div class="photo-name">${item.title}</div>`;
      card.querySelector('img').addEventListener('click', () => openModal(item));
      gallery.appendChild(card);
    });
  }

  function filterGallery() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderGallery(allItems.filter(i => i.title.toLowerCase().includes(q)));
  }

  function openModal(item) {
    currentItem = item;
    document.getElementById('modalImg').src = item.url;
    document.getElementById('modalTitle').textContent = item.title;
    document.getElementById('modalSize').textContent = 'Size: ' + (item.fileSize/1024).toFixed(2) + ' KB';
    document.getElementById('modalDate').textContent = 'Uploaded: ' + new Date(item.createdAt).toLocaleString();
    document.getElementById('modal').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
    currentItem = null;
  }

  async function deleteImage() {
    if (!currentItem) return;
    try {
      const res = await fetch('/api/media/' + currentItem.id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.ok) {
        closeModal();
        loadGallery();
      } else {
        alert('Delete failed');
      }
    } catch(e) {
      alert('Error deleting image');
    }
  }

  loadGallery();
</script>
</body>
</html>
