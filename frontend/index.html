<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FrameVault — Creative Stock Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; overflow-x: hidden; }

  /* NAVBAR */
  nav {
    position: fixed;
    width: 100%;
    top: 0;
    padding: 15px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index: 1000;
  }
  nav h1 { color: #ff9800; font-size: 28px; letter-spacing: 1px; }
  nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    padding: 10px 20px;
    background: #ff9800;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.3s;
  }
  nav a:hover { background: #e68900; transform: scale(1.05); }

  /* HERO */
  .hero {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    padding: 0 20px;
  }
  .hero img.background {
    position: absolute;
    width: 110%;
    height: 110%;
    top: -5%;
    left: -5%;
    object-fit: cover;
    filter: brightness(0.5);
    animation: zoom 25s infinite alternate;
    z-index: -2;
  }
  @keyframes zoom { from { transform: scale(1); } to { transform: scale(1.1); } }

  .hero .circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,152,0,0.2);
    animation: float 10s infinite alternate;
    z-index: -1;
  }
  .circle1 { width: 200px; height: 200px; top: 10%; left: 15%; }
  .circle2 { width: 300px; height: 300px; top: 60%; left: 70%; }
  .circle3 { width: 150px; height: 150px; top: 30%; left: 75%; }
  @keyframes float { 0% { transform: translateY(0px); } 100% { transform: translateY(-30px); } }

  .hero-content { color: #fff; max-width: 800px; animation: fadeUp 1.5s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(50px);} to {opacity:1; transform:translateY(0);} }
  .hero h1 { font-size: 60px; margin-bottom: 20px; text-shadow: 2px 2px 15px rgba(0,0,0,0.7); }
  .hero p { font-size: 22px; margin-bottom: 30px; color: #ddd; }

  .hero .buttons a {
    display: inline-block;
    margin: 10px;
    padding: 15px 35px;
    background: linear-gradient(135deg, #ff9800, #ff5722);
    border-radius: 50px;
    color: #fff;
    font-weight: bold;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .hero .buttons a:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(255,152,0,0.6);
  }

  /* FOOTER */
  footer {
    background: #111;
    text-align: center;
    padding: 30px;
    font-size: 14px;
    color: #aaa;
  }

  @media(max-width: 768px) {
    .hero h1 { font-size: 40px; }
    .hero p { font-size: 18px; }
    .hero .buttons a { padding: 12px 25px; font-size: 16px; }
  }
</style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <h1>FrameVault</h1>
    <div id="navLinks">
      <a href="about.html">About</a>
      <a href="gallery.html">Gallery</a>
      <a href="upload.html">Upload</a>
      <a href="login.html">Login</a>
      <a href="sign up.html">Sign Up</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <img class="background" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1600&q=80" alt="Hero Background">
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>

    <div class="hero-content">
      <h1>FrameVault</h1>
      <p>Your hub for stunning stock photos and videos — free, fast, and creative.</p>
      <div class="buttons">
        <a href="gallery.html">Explore Gallery</a>
        <a href="upload.html">Upload Image</a>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 FrameVault | Inspired by Pexels • Unsplash • Pixabay
  </footer>

  <script>
    const token = localStorage.getItem('token');
    const email = localStorage.getItem('userEmail');
    const nav = document.getElementById('navLinks');
    if (token) {
      nav.innerHTML = `
        <a href="about.html">About</a>
        <a href="gallery.html">Gallery</a>
        <a href="upload.html">Upload</a>
        <span style="color:#ff9800;margin-left:20px;font-weight:bold;">${email || 'Account'}</span>
        <a href="#" onclick="logout()" style="background:#333;">Logout</a>
      `;
    }
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('userEmail');
      window.location.href = 'login.html';
    }
  </script>

</body>
</html>
