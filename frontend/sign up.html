<!DOCTYPE html>
<html>
<head>
<title>Sign Up - FrameVault</title>
<style>
body{font-family:Segoe UI;background:#0f0f0f;color:white;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:#1a1a1a;padding:40px;border-radius:10px;width:300px;text-align:center;}
input{width:100%;padding:10px;margin:10px 0;border-radius:6px;border:none;box-sizing:border-box;}
button{width:100%;padding:10px;background:#ff9800;border:none;border-radius:6px;font-weight:bold;cursor:pointer;}
a{color:#ff9800;}
.msg{color:#9be49b;margin-top:10px;display:none;}
.err{color:#ff6b6b;margin-top:10px;display:none;}
</style>
</head>
<body>
<div class="box">
<h2>Create Account</h2>
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<p>Already have an account? <a href="login.html">Login</a></p>
<div class="msg" id="msg"></div>
<div class="err" id="err"></div>
</div>
<script>
async function signup(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  const err = document.getElementById('err');
  msg.style.display = 'none';
  err.style.display = 'none';
  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (res.ok) {
      msg.textContent = 'Account created! Redirecting...';
      msg.style.display = 'block';
      setTimeout(() => window.location.href = 'login.html', 1500);
    } else {
      err.textContent = data.message || 'Sign up failed';
      err.style.display = 'block';
    }
  } catch(e) {
    err.textContent = 'Could not connect to server';
    err.style.display = 'block';
  }
}
</script>
</body>
</html>
