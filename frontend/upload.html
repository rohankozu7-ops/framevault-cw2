<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload - FrameVault</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    nav {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      padding: 15px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav h1 { color: #ff9800; margin: 0; font-size: 26px; }
    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      padding: 10px 18px;
      background: #ff9800;
      border-radius: 8px;
      font-weight: bold;
    }
    nav a:hover { background: #e68900; }

    .wrap {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: #141414;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    h2 { margin: 0 0 10px; }
    p { color: #ccc; margin: 0 0 18px; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    @media (max-width: 760px) { .row { grid-template-columns: 1fr; } }

    label { display:block; font-weight: 600; margin: 10px 0 8px; }
    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #0f0f0f;
      color: #fff;
      outline: none;
    }

    .btns {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      cursor: pointer;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: 700;
    }

    .primary {
      background: linear-gradient(135deg, #ff9800, #ff5722);
      color: #fff;
    }
    .primary:hover { filter: brightness(1.05); }

    .secondary {
      background: #222;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .secondary:hover { background: #2b2b2b; }

    .preview {
      margin-top: 18px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0f0f0f;
    }
    .preview img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: none;
    }

    .msg {
      margin-top: 14px;
      color: #9be49b;
      font-weight: 600;
      display: none;
    }
    .err {
      color: #ff8a8a;
      display: none;
      margin-top: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <nav>
    <h1>FrameVault</h1>
    <div>
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
    </div>
  </nav>

  <div class="wrap">
    <div class="card">
      <h2>Upload to Gallery</h2>
      <p>Select an image and it will appear in your gallery page.</p>

      <div class="row">
        <div>
          <label>Image Title (optional)</label>
          <input id="title" type="text" placeholder="e.g., Sunset Hills" />

          <label>Select Image</label>
          <input id="file" type="file" accept="image/*" />
        </div>

        <div>
          <label>Preview</label>
          <div class="preview">
            <img id="previewImg" alt="Preview" />
          </div>
          <div class="msg" id="msg">✅ Uploaded! Open Gallery to see it.</div>
          <div class="err" id="err">❌ Please choose an image first.</div>
        </div>
      </div>

      <div class="btns">
        <button class="primary" id="uploadBtn">Upload to Gallery</button>
        <button class="secondary" id="clearBtn">Clear Saved Uploads</button>
        <a class="secondary" href="gallery.html" style="padding:12px 18px;border-radius:10px;display:inline-block;text-decoration:none;">
          Go to Gallery
        </a>
      </div>
    </div>
  </div>

  <script>
const fileInput = document.getElementById("file");
const titleInput = document.getElementById("title");
const previewImg = document.getElementById("previewImg");
const msg = document.getElementById("msg");
const err = document.getElementById("err");

let imageDataUrl = null;
let selectedFile = null;

// When user selects a file
fileInput.addEventListener("change", () => {

  msg.style.display = "none";
  err.style.display = "none";

  const file = fileInput.files[0];
  if (!file) return;

  selectedFile = file;

  const reader = new FileReader();

  reader.onload = (e) => {
    imageDataUrl = e.target.result;
    previewImg.src = imageDataUrl;
    previewImg.style.display = "block";
  };

  reader.readAsDataURL(file);

});


// Upload button
document.getElementById("uploadBtn").addEventListener("click", () => {

  msg.style.display = "none";
  err.style.display = "none";

  if (!imageDataUrl || !selectedFile) {
    err.style.display = "block";
    return;
  }

  const title = titleInput.value.trim() || "User Upload";

  // Create METAFILE (metadata object)
  const metafile = {
    mediaId: Date.now(),
    title: title,
    fileType: selectedFile.type,
    fileSize: selectedFile.size,
    createdAt: new Date().toISOString(),
    dataUrl: imageDataUrl
  };

  const saved = JSON.parse(localStorage.getItem("framevault_uploads") || "[]");

  saved.unshift(metafile);

  localStorage.setItem("framevault_uploads", JSON.stringify(saved));

  // Reset fields
  titleInput.value = "";
  fileInput.value = "";
  imageDataUrl = null;
  selectedFile = null;
  previewImg.style.display = "none";
  previewImg.src = "";

  msg.style.display = "block";

});


// Clear uploads
document.getElementById("clearBtn").addEventListener("click", () => {

  localStorage.removeItem("framevault_uploads");
  msg.style.display = "none";
  err.style.display = "none";

  alert("Saved uploads cleared!");

});
</script>

</body>
</html>
