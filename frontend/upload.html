<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload - FrameVault</title>
  <style>
    body { margin:0; font-family:"Segoe UI",Arial,sans-serif; background:#0f0f0f; color:#fff; }
    nav { background:rgba(0,0,0,0.6); backdrop-filter:blur(10px); padding:15px 50px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:1000; }
    nav h1 { color:#ff9800; margin:0; font-size:26px; }
    nav a { color:white; text-decoration:none; margin-left:20px; padding:10px 18px; background:#ff9800; border-radius:8px; font-weight:bold; }
    nav a:hover { background:#e68900; }
    .wrap { max-width:900px; margin:40px auto; padding:0 20px; }
    .card { background:#141414; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:24px; box-shadow:0 12px 30px rgba(0,0,0,0.35); }
    h2 { margin:0 0 10px; }
    p { color:#ccc; margin:0 0 18px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    @media(max-width:760px){ .row{ grid-template-columns:1fr; } }
    label { display:block; font-weight:600; margin:10px 0 8px; }
    input[type="text"], input[type="file"] { width:100%; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:#0f0f0f; color:#fff; outline:none; box-sizing:border-box; }
    .btns { margin-top:18px; display:flex; gap:12px; flex-wrap:wrap; }
    button { border:none; cursor:pointer; padding:12px 18px; border-radius:10px; font-weight:700; }
    .primary { background:linear-gradient(135deg,#ff9800,#ff5722); color:#fff; }
    .secondary { background:#222; color:#fff; border:1px solid rgba(255,255,255,0.12); }
    .preview { margin-top:18px; border-radius:14px; overflow:hidden; border:1px solid rgba(255,255,255,0.1); background:#0f0f0f; }
    .preview img { width:100%; height:320px; object-fit:cover; display:none; }
    .msg { margin-top:14px; color:#9be49b; font-weight:600; display:none; }
    .err { color:#ff8a8a; display:none; margin-top:14px; font-weight:600; }
  </style>
</head>
<body>
  <nav>
    <h1>FrameVault</h1>
    <div>
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
    </div>
  </nav>
  <div class="wrap">
    <div class="card">
      <h2>Upload to Gallery</h2>
      <p>Select an image and it will be stored in Azure Blob Storage.</p>
      <div class="row">
        <div>
          <label>Image Title (optional)</label>
          <input id="title" type="text" placeholder="e.g., Sunset Hills" />
          <label>Select Image</label>
          <input id="file" type="file" accept="image/*" />
        </div>
        <div>
          <label>Preview</label>
          <div class="preview"><img id="previewImg" alt="Preview" /></div>
          <div class="msg" id="msg">✅ Uploaded! Open Gallery to see it.</div>
          <div class="err" id="err"></div>
        </div>
      </div>
      <div class="btns">
        <button class="primary" id="uploadBtn">Upload to Gallery</button>
        <a class="secondary" href="gallery.html" style="padding:12px 18px;border-radius:10px;display:inline-block;text-decoration:none;">Go to Gallery</a>
      </div>
    </div>
  </div>
  <script>
    const fileInput = document.getElementById('file');
    const titleInput = document.getElementById('title');
    const previewImg = document.getElementById('previewImg');
    const msg = document.getElementById('msg');
    const err = document.getElementById('err');
    let selectedFile = null;

    fileInput.addEventListener('change', () => {
      msg.style.display = 'none';
      err.style.display = 'none';
      const file = fileInput.files[0];
      if (!file) return;
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        previewImg.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('uploadBtn').addEventListener('click', async () => {
      msg.style.display = 'none';
      err.style.display = 'none';
      const token = localStorage.getItem('token');
      if (!token) {
        err.textContent = '❌ Please log in first.';
        err.style.display = 'block';
        setTimeout(() => window.location.href = 'login.html', 1500);
        return;
      }
      if (!selectedFile) {
        err.textContent = '❌ Please choose an image first.';
        err.style.display = 'block';
        return;
      }
      const formData = new FormData();
      formData.append('image', selectedFile);
      formData.append('title', titleInput.value.trim() || 'User Upload');
      try {
        const res = await fetch('/api/media', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token },
          body: formData
        });
        const data = await res.json();
        if (res.ok) {
          titleInput.value = '';
          fileInput.value = '';
          selectedFile = null;
          previewImg.style.display = 'none';
          msg.style.display = 'block';
        } else {
          err.textContent = '❌ ' + (data.message || 'Upload failed');
          err.style.display = 'block';
        }
      } catch(e) {
        err.textContent = '❌ Could not connect to server';
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
